<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Clipping Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Outfit', sans-serif;
            background-image: radial-gradient(circle at 100% 0%, #064e3b, #0f172a);
            min-height: 100vh;
        }

        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Custom Scrollbar for inner boxes */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body class="antialiased selection:bg-emerald-500 selection:text-white">

    <nav class="w-full glass sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
            <a href="../index.html" class="flex items-center gap-2 hover:text-emerald-400 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                <span class="font-bold tracking-tight">Back to Suite</span>
            </a>
            <div class="font-black text-xl text-emerald-400 flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><path d="M10 8v8l6-4-6-4Z"/></svg>
                Auto Clipping Engine
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-8">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <!-- Left Config Panel -->
            <div class="lg:col-span-5 space-y-6">
                
                <div class="glass p-6 rounded-2xl">
                    <h2 class="text-xs font-bold uppercase text-emerald-500 mb-4 tracking-widest flex items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                        1. Connect AI Intelligence
                    </h2>
                    <div class="space-y-3">
                        <label class="text-[11px] text-slate-400 block">Google Gemini API Key (Required for AI magic)</label>
                        <input type="password" id="api-key" placeholder="AIzaSy..." class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-emerald-500 transition-colors font-mono">
                        <div class="flex items-center justify-between">
                            <label class="flex items-center gap-2 cursor-pointer group">
                                <input type="checkbox" id="remember-key" class="w-3 h-3 rounded bg-slate-900 border-slate-700 text-emerald-500 accent-emerald-500">
                                <span class="text-[10px] text-slate-400 group-hover:text-emerald-400 transition-colors">Remember key on this device</span>
                            </label>
                            <span class="text-[9px] text-slate-500">Stored locally, never on a server.</span>
                        </div>
                    </div>
                </div>

                <div class="glass p-6 rounded-2xl">
                    <h2 class="text-xs font-bold uppercase text-emerald-500 mb-4 tracking-widest flex items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m22 8-6 4 6 4V8Z"/><rect width="14" height="12" x="2" y="6" rx="2" ry="2"/></svg>
                        2. Upload Long-Form Video
                    </h2>
                    <input type="file" id="video-upload" accept="video/mp4, video/webm" class="text-[11px] block w-full text-slate-300 file:mr-3 file:py-2 file:px-4 file:rounded-xl file:border-0 file:text-xs file:font-bold file:bg-emerald-600/20 file:text-emerald-400 hover:file:bg-emerald-600/30 cursor-pointer">
                    
                    <div class="grid grid-cols-2 gap-4 mt-6">
                        <div>
                            <label class="text-[10px] text-slate-400 block mb-2 uppercase font-bold tracking-wider">AI Vibe Target</label>
                            <select class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-xs focus:outline-none focus:border-emerald-500 text-slate-300">
                                <option>Most Viral/Funny</option>
                                <option>Deep/Serious</option>
                                <option>Educational Hook</option>
                            </select>
                        </div>
                        <div>
                            <label class="text-[10px] text-slate-400 block mb-2 uppercase font-bold tracking-wider">Target Length</label>
                            <select class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-xs focus:outline-none focus:border-emerald-500 text-slate-300">
                                <option>15 Seconds</option>
                                <option>30 Seconds</option>
                                <option>60 Seconds (Full Short)</option>
                            </select>
                        </div>
                    </div>
                </div>

                <button id="clip-btn" onclick="startMockProcessing()" class="w-full bg-emerald-600 hover:bg-emerald-500 py-4 rounded-xl font-black text-xl transition-all shadow-[0_0_20px_rgba(5,150,105,0.4)] hover:shadow-[0_0_30px_rgba(5,150,105,0.6)] animate-pulse">
                    FIND VIRAL CLIP
                </button>

            </div>

            <!-- Right Preview Panel -->
            <div class="lg:col-span-7">
                <div class="glass p-4 rounded-3xl h-[650px] relative overflow-hidden flex items-center justify-center border-slate-700/50 object-cover">
                    
                    <!-- Empty State -->
                    <div id="preview-empty" class="text-center opacity-40 flex flex-col items-center">
                        <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" class="mb-4 text-emerald-500"><rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"/><line x1="7" y1="2" x2="7" y2="22"/><line x1="17" y1="2" x2="17" y2="22"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="2" y1="7" x2="7" y2="7"/><line x1="2" y1="17" x2="7" y2="17"/><line x1="17" y1="17" x2="22" y2="17"/><line x1="17" y1="7" x2="22" y2="7"/></svg>
                        <p class="font-bold text-lg">Output Preview</p>
                        <p class="text-xs">Your AI extracted 9:16 clip will appear here.</p>
                    </div>

                    <!-- Processing UI Overlay -->
                    <div id="processing-overlay" class="absolute inset-0 bg-slate-900/95 z-20 hidden flex-col items-center justify-center p-8 backdrop-blur-3xl">
                        <div class="w-16 h-16 rounded-full border-4 border-emerald-500/20 border-t-emerald-500 animate-spin mb-6"></div>
                        <h3 id="proc-title" class="text-xl font-black mb-2 text-emerald-400">Transcribing Audio...</h3>
                        <p id="proc-desc" class="text-sm text-slate-400 font-mono text-center max-w-sm">Generating transcript for Gemini analysis.</p>
                        
                        <div class="w-full max-w-xs mt-8 bg-slate-800 rounded-full h-1 overflow-hidden">
                            <div id="proc-bar" class="bg-emerald-500 h-full w-0 transition-all duration-300"></div>
                        </div>
                    </div>

                    <!-- The final result mockup -->
                    <video id="result-video" class="hidden absolute h-full w-[365px] rounded-2xl shadow-2xl object-cover" autoplay loop playsinline></video>
                    
                    <!-- Caption Overlay Mock -->
                    <div id="mock-captions" class="hidden absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-[365px] text-center z-10 pointer-events-none transition-transform">
                        <span id="mock-caption-text" class="text-[55px] leading-tight font-black uppercase inline-block transition-transform duration-100" style="text-shadow: 3px 3px 0 #000, -3px -3px 0 #000, 3px -3px 0 #000, -3px 3px 0 #000, 0 8px 20px rgba(0,0,0,0.9); font-family: 'Outfit', sans-serif;"></span>
                    </div>

                </div>

                <div id="post-clip-actions" class="hidden mt-6 flex gap-4 justify-center animate-fade-in-up">
                    <button onclick="startCaptionMock()" class="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-xl font-black text-lg transition-all shadow-[0_0_20px_rgba(37,99,235,0.3)] active:scale-95 border border-blue-500">
                        + ADD AI CAPTIONS
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Load saved key on startup
        document.addEventListener('DOMContentLoaded', () => {
            const saved = localStorage.getItem('gemini_key');
            if(saved) {
                document.getElementById('api-key').value = saved;
                document.getElementById('remember-key').checked = true;
            }
        });

        async function startMockProcessing() {
            const videoInput = document.getElementById('video-upload').files[0];
            const apiKey = document.getElementById('api-key').value;
            const remember = document.getElementById('remember-key').checked;

            if (!videoInput) return alert("Please upload a long-form video first.");
            if (!apiKey) return alert("Please enter your Gemini API Key to use the AI engine.");

            // Save or preserve privacy of API key
            if (remember) {
                localStorage.setItem('gemini_key', apiKey);
            } else {
                localStorage.removeItem('gemini_key');
            }

            document.getElementById('preview-empty').classList.add('hidden');
            const overlay = document.getElementById('processing-overlay');
            overlay.classList.remove('hidden');
            overlay.classList.add('flex');

            const title = document.getElementById('proc-title');
            const desc = document.getElementById('proc-desc');
            const bar = document.getElementById('proc-bar');

            // Simulate Transcribing
            title.textContent = "Extracting Audio Transcript...";
            desc.textContent = "Converting video voices into text locally.";
            bar.style.width = "20%";
            await new Promise(r => setTimeout(r, 2000));

            // Simulate Gemini
            title.textContent = "Querying Gemini AI...";
            desc.textContent = `Analyzing transcript with API key ${apiKey.substring(0,6)}... to find the highest retention moments.`;
            bar.style.width = "50%";
            await new Promise(r => setTimeout(r, 3000));

            // Simulate Cropping
            title.textContent = "Rendering 9:16 Custom Crop...";
            desc.textContent = "Cutting clip from 01:23 to 01:53 and applying fluid tracking.";
            bar.style.width = "85%";
            await new Promise(r => setTimeout(r, 2000));

            // Done
            bar.style.width = "100%";
            await new Promise(r => setTimeout(r, 500));
            overlay.classList.add('hidden');
            overlay.classList.remove('flex');
            
            // Show the raw video but cropped to 9:16 to simulate the output
            const resVid = document.getElementById('result-video');
            resVid.src = URL.createObjectURL(videoInput);
            resVid.classList.remove('hidden');
            
            // Fast forward into the video safely
            resVid.onloadedmetadata = () => {
                if(resVid.duration > 10) resVid.currentTime = resVid.duration / 3;
            };

            // Reveal phase 2 actions
            document.getElementById('post-clip-actions').classList.remove('hidden');
        }

        async function startCaptionMock() {
            const overlay = document.getElementById('processing-overlay');
            overlay.classList.remove('hidden');
            overlay.classList.add('flex');
            
            const title = document.getElementById('proc-title');
            const desc = document.getElementById('proc-desc');
            const bar = document.getElementById('proc-bar');

            bar.style.transition = "none";
            bar.style.width = "0%";
            setTimeout(() => bar.style.transition = "all 0.3s", 50);

            title.textContent = "Generating Timestamps...";
            desc.textContent = "Using AI to align audio phonemes with exact video frames.";
            bar.style.width = "40%";
            await new Promise(r => setTimeout(r, 1500));

            title.textContent = "Burning Custom Titles...";
            desc.textContent = "Applying dynamic text strokes and highlights.";
            bar.style.width = "90%";
            await new Promise(r => setTimeout(r, 1500));

            bar.style.width = "100%";
            await new Promise(r => setTimeout(r, 500));
            overlay.classList.add('hidden');
            overlay.classList.remove('flex');

            // Show Captions
            document.getElementById('mock-captions').classList.remove('hidden');
            
            // Change export button text
            document.getElementById('post-clip-actions').innerHTML = `
                <button class="w-full bg-emerald-600 hover:bg-emerald-500 py-4 rounded-xl font-black text-xl transition-all shadow-[0_0_20px_rgba(5,150,105,0.4)] active:scale-95 border border-emerald-500">
                    ⬇ EXPORT FINAL CLIP
                </button>
            `;

            // Animate captions
            let words = ["WAIT", "THIS", "CLIP", "IS", "VIRAL", "🔥🔥"];
            let colors = ["#FFF", "#FFF", "#38bdf8", "#FFF", "#eab308", "#FFF"];
            let wordIdx = 0;
            const capEl = document.getElementById('mock-caption-text');
            
            setInterval(() => {
                capEl.textContent = words[wordIdx];
                capEl.style.color = colors[wordIdx];
                // simple pop animation
                capEl.style.transform = 'scale(1.1) rotate(' + (Math.random() * 4 - 2) + 'deg)';
                setTimeout(() => capEl.style.transform = 'scale(1) rotate(0deg)', 150);
                wordIdx = (wordIdx + 1) % words.length;
            }, 500);
        }
    </script>
</body>
</html>
